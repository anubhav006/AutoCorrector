<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCorrect AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #818cf8;       /* Lighter Indigo for dark background */
            --primary-hover: #6366f1;
            /* Ultra Transparent Glass Backgrounds */
            --card-glass: rgba(255, 255, 255, 0.1); 
            --input-glass: rgba(255, 255, 255, 0.15);
            --border-glass: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;     /* White text */
            --text-light: #e2e8f0;    /* Light gray text */
            --radius: 20px;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            
            /* Background Image */
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        /* Dark Overlay to make white text pop */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5); /* 50% dark overlay */
            z-index: -1;
        }

        /* --- THE TRANSPARENT GLASS CARD --- */
        .main-card {
            background: var(--card-glass);
            backdrop-filter: blur(16px); /* Strong blur effect */
            -webkit-backdrop-filter: blur(16px);
            width: 100%;
            max-width: 500px;
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-glass);
        }

        header { text-align: center; margin-bottom: 2rem; }
        
        h1 {
            font-size: 2.2rem;
            margin: 0;
            color: #ffffff;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        p.subtitle { color: var(--text-light); margin-top: 0.5rem; font-size: 1rem; }

        /* --- Upload Section --- */
        .upload-area {
            border: 2px dashed var(--border-glass);
            border-radius: var(--radius);
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            position: relative;
            background: var(--input-glass);
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.02);
        }

        input[type="file"] {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0; opacity: 0; cursor: pointer;
        }

        .upload-icon { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }
        .file-status { font-size: 0.9rem; color: #ffffff; font-weight: 500; }

        /* --- Buttons --- */
        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 1.5rem;
            box-shadow: 0 4px 15px rgba(129, 140, 248, 0.4);
        }

        .btn:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-2px); }
        .btn:disabled { background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); cursor: not-allowed; box-shadow: none; }

        /* --- Search Input --- */
        .search-box {
            position: relative;
            margin-top: 2rem;
            opacity: 0.4;
            pointer-events: none;
        }
        
        .search-box.active { opacity: 1; pointer-events: all; }

        input[type="text"] {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            background: var(--input-glass);
            color: white;
        }

        input[type="text"]::placeholder { color: rgba(255,255,255,0.6); }
        input[type="text"]:focus { border-color: var(--primary); background: rgba(255,255,255,0.2); }

        .search-icon {
            position: absolute; left: 1rem; top: 50%;
            transform: translateY(-50%); color: rgba(255,255,255,0.7);
        }

        /* --- Results --- */
        #results-container { margin-top: 1.5rem; }

        .result-card {
            background: var(--input-glass);
            backdrop-filter: blur(10px);
            padding: 1rem;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            border-left: 4px solid var(--primary);
            border-top: 1px solid var(--border-glass);
            border-right: 1px solid var(--border-glass);
            border-bottom: 1px solid var(--border-glass);
            animation: slideUp 0.4s ease-out forwards;
        }

        .prob {
            background: rgba(129, 140, 248, 0.2); 
            color: #c7d2fe;
            padding: 5px 12px; border-radius: 20px;
            font-size: 0.85rem; font-weight: 600;
            border: 1px solid rgba(129, 140, 248, 0.3);
        }

        /* --- Notifications --- */
        .toast {
            margin-top: 1rem; font-size: 0.9rem; text-align: center;
            padding: 0.8rem; border-radius: 8px; display: none; font-weight: 600;
            backdrop-filter: blur(5px);
        }
        .success { background: rgba(34, 197, 94, 0.2); color: #86efac; display: block; border: 1px solid rgba(34, 197, 94, 0.4); }
        .error { background: rgba(239, 68, 68, 0.2); color: #fca5a5; display: block; border: 1px solid rgba(239, 68, 68, 0.4); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="main-card">
        <header>
            <h1>AutoCorrect AI</h1>
            <p class="subtitle">Smart Spelling Correction System</p>
        </header>

        <div class="upload-area" id="drop-zone">
            <span class="upload-icon">📁</span>
            <span id="file-label" class="file-status">Drag & Drop or Click to Upload (.txt)</span>
            <input type="file" id="file-input" accept=".txt">
        </div>
        
        <button id="train-btn" class="btn">Train Model</button>
        <div id="status-msg" class="toast"></div>

        <div class="search-box" id="search-section">
            <span class="search-icon">🔍</span>
            <input type="text" id="word-input" placeholder="Type a misspelled word...">
        </div>

        <div id="results-container"></div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const fileLabel = document.getElementById('file-label');
        const trainBtn = document.getElementById('train-btn');
        const statusMsg = document.getElementById('status-msg');
        const searchSection = document.getElementById('search-section');
        const wordInput = document.getElementById('word-input');
        const resultsContainer = document.getElementById('results-container');
        const dropZone = document.getElementById('drop-zone');

        fileInput.addEventListener('change', () => {
            if(fileInput.files.length > 0) {
                fileLabel.textContent = `Selected: ${fileInput.files[0].name}`;
                dropZone.style.borderColor = 'var(--primary)';
                dropZone.style.background = 'rgba(255,255,255,0.2)';
            }
        });

        trainBtn.addEventListener('click', async () => {
            if(!fileInput.files.length) {
                showToast("Please select a file first.", "error");
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            trainBtn.textContent = "Training...";
            trainBtn.disabled = true;

            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();

                if(res.ok) {
                    showToast(`Success! Vocab size: ${data.vocab_size}`, "success");
                    searchSection.classList.add('active'); 
                    wordInput.focus();
                } else {
                    showToast(data.error, "error");
                }
            } catch (err) {
                showToast("Server error. Is Python running?", "error");
            } finally {
                trainBtn.textContent = "🚀 Train Model";
                trainBtn.disabled = false;
            }
        });

        wordInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const text = wordInput.value.trim();
                if(!text) return;

                resultsContainer.innerHTML = '<p style="text-align:center; color:rgba(255,255,255,0.7);">Thinking...</p>';

                try {
                    const res = await fetch('/correct', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ word: text })
                    });
                    const data = await res.json();

                    resultsContainer.innerHTML = ''; 

                    if(data.suggestions && data.suggestions.length > 0) {
                        data.suggestions.forEach(item => {
                            const probVal = item.prob || item.probability || "High";
                            const div = document.createElement('div');
                            div.className = 'result-card';
                            div.innerHTML = `
                                <span style="font-weight:600; font-size:1.1rem; color: white;">${item.word}</span>
                                <span class="prob">${probVal}</span>
                            `;
                            resultsContainer.appendChild(div);
                        });
                    } else {
                        resultsContainer.innerHTML = '<p style="text-align:center; color:rgba(255,255,255,0.7);">No suggestions found.</p>';
                    }
                } catch (err) {
                    resultsContainer.innerHTML = '<p style="text-align:center; color:#fca5a5;">Connection Error</p>';
                }
            }
        });

        function showToast(msg, type) {
            statusMsg.textContent = msg;
            statusMsg.className = `toast ${type}`;
            setTimeout(() => { statusMsg.style.display = 'none'; }, 3000);
        }
    </script>
</body>
</html>
